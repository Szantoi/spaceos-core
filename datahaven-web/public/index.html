<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datahaven Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1>Datahaven</h1>
        <span class="subtitle">Message Queue Dashboard</span>
      </div>
      <div class="header-right">
        <div id="connection-status" class="status-indicator offline">
          <span class="status-dot"></span>
          <span class="status-text">Connecting...</span>
        </div>
      </div>
    </header>

    <!-- Auth overlay -->
    <div id="auth-overlay" class="overlay hidden">
      <div class="auth-box">
        <h2>Authentication Required</h2>
        <input type="password" id="auth-token" placeholder="Enter token...">
        <button id="auth-submit">Login</button>
        <p id="auth-error" class="error hidden"></p>
      </div>
    </div>

    <!-- Main content -->
    <main class="main">
      <!-- Stats cards -->
      <section class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">-</div>
          <div class="stat-label">Total Messages</div>
        </div>
        <div class="stat-card pending">
          <div class="stat-value" id="stat-pending">-</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card success">
          <div class="stat-value" id="stat-acked">-</div>
          <div class="stat-label">Acknowledged</div>
        </div>
        <div class="stat-card info">
          <div class="stat-value" id="stat-daemons">-</div>
          <div class="stat-label">Daemons</div>
        </div>
      </section>

      <!-- Two column layout -->
      <div class="two-columns">
        <!-- Daemons panel -->
        <section class="panel">
          <div class="panel-header">
            <h2>Daemons</h2>
            <button class="btn-refresh" onclick="loadDaemons()">Refresh</button>
          </div>
          <div class="panel-content" id="daemons-list">
            <div class="loading">Loading daemons...</div>
          </div>
        </section>

        <!-- Messages panel -->
        <section class="panel">
          <div class="panel-header">
            <h2>Recent Messages</h2>
            <div class="filters">
              <select id="filter-status" onchange="loadMessages()">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="acked">Acknowledged</option>
              </select>
              <button class="btn-refresh" onclick="loadMessages()">Refresh</button>
            </div>
          </div>
          <div class="panel-content" id="messages-list">
            <div class="loading">Loading messages...</div>
          </div>
        </section>
      </div>

      <!-- Knowledge search -->
      <section class="panel knowledge-panel">
        <div class="panel-header">
          <h2>Knowledge Search</h2>
          <div id="knowledge-status" class="knowledge-status">
            <span class="status-dot"></span>
            <span class="status-text">Checking...</span>
          </div>
        </div>
        <div class="search-box">
          <input type="text" id="knowledge-query" placeholder="Search knowledge base...">
          <button onclick="searchKnowledge()">Search</button>
        </div>
        <div class="panel-content" id="knowledge-results">
          <p class="hint">Enter a query to search the knowledge base.</p>
        </div>
      </section>
    </main>

    <!-- Message detail modal -->
    <div id="message-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Message Details</h3>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="message-detail">
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
