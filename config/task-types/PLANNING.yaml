type: PLANNING
description: "Architectural design, implementation proposal"
strictness: medium
require_both: false

criteria:
  blocking:
    - id: scope_clear
      name: "Scope világos és jól definiált"
      check: "manual"
      weight: 10

    - id: tradeoffs_documented
      name: "Trade-off-ok dokumentálva"
      check: "manual"
      weight: 8

  non_blocking:
    - id: steps_realistic
      name: "Implementációs lépések reálisak"
      check: "manual"
      weight: 5

approval_threshold:
  blocking_score: 14  # 78%
  total_score: 18     # 78%

escalation_policy:
  max_attempts: 1
  escalate_to: root
  notify: telegram

version: 1.0.0
