type: CODE
description: "Backend/Frontend implementáció - új feature, endpoint, komponens"
strictness: high
require_both: true

criteria:
  blocking:
    - id: build_success
      name: "Build sikeresen lefut"
      check: "pnpm build || dotnet build"
      weight: 10

    - id: tests_passing
      name: "Tesztek zöldek"
      check: "pnpm test --run || dotnet test"
      weight: 10

    - id: no_mock_leak
      name: "Mock adat eltávolítva ha van endpoint"
      check: "manual"
      weight: 10

    - id: error_handling
      name: "Error handling minden API hívásnál"
      check: "manual"
      weight: 8

  non_blocking:
    - id: dry_principles
      name: "DRY elvek betartva"
      check: "manual"
      weight: 5

    - id: component_reusability
      name: "Komponens újrafelhasználhatóság"
      check: "manual"
      weight: 3

approval_threshold:
  blocking_score: 38  # 95% blocking kell
  total_score: 50     # 90% total

escalation_policy:
  max_attempts: 2
  escalate_to: root
  notify: telegram

version: 1.0.0
