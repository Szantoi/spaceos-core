version: "1.0"

# =============================================================================
# MCP CONNECTOR CONFIGURATION
# SpaceOS Central MCP Aggregator
# =============================================================================

# -----------------------------------------------------------------------------
# BACKENDS
# All MCP servers that the connector proxies to
# -----------------------------------------------------------------------------
backends:
  # SpaceOS Knowledge Service (HTTP)
  knowledge:
    type: http
    url: "http://localhost:3456/mcp"
    headers:
      Authorization: "Bearer IoUpLUgr4v6Mj5lt4u2XD1JOy5iGmVdxne473srMl2o="
    health_check: "/health"
    timeout: 30000

  # Playwright MCP - Browser automation for E2E testing
  # Official Microsoft package: https://www.npmjs.com/package/@playwright/mcp
  playwright:
    type: stdio
    command: "npx"
    args: ["-y", "@playwright/mcp@latest"]
    auto_restart: true
    timeout: 60000  # Browser operations can be slow

  # Ref MCP - Developer documentation search
  # Using @anthropic-ai/claude-code-mcp-adapter for ref
  ref:
    type: stdio
    command: "npx"
    args: ["-y", "@anthropic-ai/mcp-server-fetch"]
    auto_restart: true
    timeout: 30000

  # Context7 MCP - Library documentation
  context7:
    type: stdio
    command: "npx"
    args: ["-y", "@upstash/context7-mcp"]
    auto_restart: true
    timeout: 30000

  # Brave Search MCP - Web search
  # Using modelcontextprotocol official package
  brave-search:
    type: stdio
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-brave-search"]
    env:
      BRAVE_API_KEY: "${BRAVE_API_KEY}"
    auto_restart: true
    timeout: 30000

# -----------------------------------------------------------------------------
# ROUTING
# Maps tool names to backends
# -----------------------------------------------------------------------------
routing:
  # =========================================================================
  # KNOWLEDGE SERVICE TOOLS (80+)
  # =========================================================================

  # Mailbox tools
  list_inbox: knowledge
  send_message: knowledge
  read_inbox_message: knowledge
