  # =========================================================================
  # PLAYWRIGHT MCP TOOLS
  # Browser automation for E2E testing
  # =========================================================================
  playwright_navigate: playwright
  playwright_screenshot: playwright
  playwright_click: playwright
  playwright_fill: playwright
  playwright_select: playwright
  playwright_hover: playwright
  playwright_evaluate: playwright
  playwright_console_logs: playwright
