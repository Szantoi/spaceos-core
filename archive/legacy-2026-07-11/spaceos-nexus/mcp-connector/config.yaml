  generate_module: knowledge
  generate_hook: knowledge
  get_codegen_status: knowledge
  check_api_client_status: knowledge
  verify_frontend_build: knowledge
  scaffold_from_pattern: knowledge
  analyze_bundle_size: knowledge

  # Memory Management
  save_tiered_memory: knowledge
  promote_memory: knowledge
  get_session_context: knowledge
  run_retrospective: knowledge
  apply_retrospective: knowledge
  generate_handoff: knowledge
  generate_daily_digest: knowledge
  memory_health_report: knowledge
  compress_memory: knowledge
  extract_patterns: knowledge

  # Skills
  create_skill: knowledge
  list_all_skills: knowledge
  get_skill_metadata: knowledge
  delete_skill: knowledge

  # Epic Management
  get_epic_progress: knowledge
  get_all_epics_progress: knowledge
  resolve_epic_dependencies: knowledge

  # Subscriptions
  subscribe_to_task: knowledge
  subscribe_to_terminal: knowledge
  unsubscribe: knowledge
  get_subscriptions: knowledge

  # Goals
  create_goal: knowledge
  list_goals: knowledge
  get_goal: knowledge
  check_goal_criteria: knowledge
