  # =========================================================================
  # BRAVE SEARCH MCP TOOLS
  # Web search
  # =========================================================================
  brave_web_search: brave-search
  brave_local_search: brave-search

# -----------------------------------------------------------------------------
# PERMISSIONS
# Terminal-based access control
# -----------------------------------------------------------------------------
permissions:
  # Root - full access
  root:
    - "*"

  # Conductor - coordination tools
  conductor:
    backends: [knowledge, brave-search]
    tools:
      - search_knowledge
      - list_inbox
      - send_message
      - create_task
      - get_terminal_status_aggregate
      - get_focus_queue
      - set_active_task
      - register_working
      - register_idle
      - get_epic_progress
      - resolve_epic_dependencies
      - spawn_work_session
      - brave_web_search

  # Backend - development tools
  backend:
    backends: [knowledge, ref, context7, playwright]
    tools:
      - search_knowledge
      - read_memory
      - append_memory
      - fetch_task
      - ack_task
      - complete_task
      - register_working
      - register_idle
      - build_session_start_context
      - get_context_saturation
      - ref_search_documentation
      - ref_read_url
      - resolve-library-id
      - get-library-docs
      - playwright_navigate
      - playwright_screenshot
      - playwright_click
      - playwright_fill
      - playwright_evaluate

  # Frontend - UI development tools
  frontend:
    backends: [knowledge, ref, context7, playwright]
    tools:
      - search_knowledge
      - read_memory
      - append_memory
      - fetch_task
      - ack_task
      - complete_task
      - register_working
      - register_idle
      - build_session_start_context
      - ref_search_documentation
      - resolve-library-id
      - get-library-docs
      - playwright_navigate
      - playwright_screenshot
      - playwright_click
      - playwright_fill
      - playwright_evaluate

  # Architect - design tools
  architect:
    backends: [knowledge, ref, brave-search]
    tools:
      - search_knowledge
      - read_memory
      - append_memory
      - register_working
      - register_idle
      - ref_search_documentation
      - ref_read_url
      - brave_web_search

  # Librarian - documentation tools
  librarian:
    backends: [knowledge, ref]
    tools:
      - search_knowledge
      - read_memory
      - write_memory
      - append_memory
      - register_working
      - register_idle
      - ref_search_documentation
      - ref_read_url

  # Explorer - research tools
  explorer:
    backends: [knowledge, ref, brave-search]
    tools:
      - search_knowledge
      - read_memory
      - register_working
      - register_idle
      - ref_search_documentation
      - brave_web_search

  # Designer - UI/UX tools
  designer:
    backends: [knowledge, ref, playwright]
    tools:
      - search_knowledge
      - read_memory
      - register_working
      - register_idle
      - ref_search_documentation
      - playwright_navigate
      - playwright_screenshot

  # Monitor - status tools
  monitor:
    backends: [knowledge]
    tools:
      - get_terminal_status_aggregate
      - get_context_saturation
      - get_epic_progress
      - list_goals
      - check_goal_criteria

  # Nexus - infrastructure tools
  nexus:
    backends: [knowledge, ref, context7]
    tools:
      - search_knowledge
      - read_memory
      - write_memory
      - append_memory
      - fetch_task
      - ack_task
      - complete_task
      - register_working
      - register_idle
      - ref_search_documentation
      - resolve-library-id
      - get-library-docs

# -----------------------------------------------------------------------------
# AUDIT
# Centralized logging
# -----------------------------------------------------------------------------
audit:
  enabled: true
  log_file: "/opt/spaceos/logs/mcp-connector-audit.log"
  log_format: json
  log_level: info
  metrics_enabled: false  # Enable in Phase 2

# -----------------------------------------------------------------------------
# PERFORMANCE
# Tuning and circuit breaker
# -----------------------------------------------------------------------------
performance:
  request_timeout: 30000
  max_concurrent_requests: 100
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    timeout: 60000
    half_open_after: 30000
