# SpaceOS Knowledge Service Log Rotation
# Install: sudo cp logrotate.conf /etc/logrotate.d/spaceos-knowledge

/var/log/spaceos/knowledge-service.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    size 50M
    create 0640 root root
}

/opt/spaceos/logs/dispatcher/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    size 20M
    create 0640 root root
}
