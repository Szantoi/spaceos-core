  # External agents can be added here:
  # "external-agent-token-abc": "external-reader"
  # "partner-system-token-xyz": "partner-api"

# Agent groups (optional)
# Define groups of agents that share permissions
groups:
  developers:
    - backend
    - frontend
    - designer

  support:
    - architect
    - librarian
    - explorer

  coordinators:
    - root
    - conductor

# Default agent for requests without valid token
# Set to null to reject unauthenticated requests
# Set to an agent name to allow anonymous access with limited permissions
default_agent: null
