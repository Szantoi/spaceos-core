  "XRQ6Uk9X6PBNJbUzwRV9bbxUCFnIbkVKs9eEgNjUgc8=": "cabinet-bridge"

  # ─── External Teams (examples) ───────────────────────────────────────────
  # Marketing team - read-only access
  "mkt-pm-token-abc123": "marketing-pm"
  "mkt-content-token-def456": "marketing-content"
