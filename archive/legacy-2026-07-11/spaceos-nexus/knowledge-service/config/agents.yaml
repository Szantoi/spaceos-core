# Agent Token Configuration
#
# Defines which tokens map to which agent identities.
# Changes are auto-reloaded every 30 seconds (no restart needed).
#
# Token format: any unique string
# Agent name: any string (used in tool-permissions.yaml)
#
# Note: You can also use environment variables:
#   MCP_AUTH_TOKEN=xxx       -> master token (root access)
#   MCP_TOKEN_<NAME>=xxx     -> agent token (overrides this file)

version: "1.1"
updated: "2026-06-24"

# Master token (has root/admin access to all tools)
# If not set here, uses MCP_AUTH_TOKEN env variable
# IMPORTANT: This must match the MCP_AUTH_TOKEN in ~/.claude/settings.json
master_token: "IoUpLUgr4v6Mj5lt4u2XD1JOy5iGmVdxne473srMl2o="

# Agent tokens
# Format: token -> agent_name
#
# The agent_name is used to look up permissions in tool-permissions.yaml
# Each terminal has its own token for audit trail purposes.
agents:
  # ─── SpaceOS Core Terminals (7) ──────────────────────────────────────────
  # Coordinator
  "6ozohLp1ESnTWhWhlkUiyxTwh3cm3Ia+yGT/5YXgqhs=": "conductor"

  # Support terminals
  "DAP3+yV6SIQo9PH9zcoDYzLp3/XGpP1hFpiOjVO8ru4=": "architect"
  "luBZgBbnTwLKsQ1HKmVMYo+j3Cwul64QVxOVb5/7wYE=": "librarian"
  "aT/iZsIUyNY94CjuHChyGVgv5MFES5/l3V99gorrxcQ=": "explorer"

  # Developer terminals
  "jKB4yyFknSgwRiC8ewLbdFuPxEo8Vgi157lW5QBsmsY=": "backend"
  "hsS4SbZGWWljJ8VNTkG18ys2X40BPbl2bH33h6+WIqk=": "frontend"
  "gZnKTnAZ2pgRrkee1EQ7qvcMKBCJ4tDsFgCId5oFGzw=": "designer"

  # ─── Federation Bridges (Inter-Island Communication) ─────────────────────
