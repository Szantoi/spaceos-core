[pytest]
# Pytest configuration for SpaceOS Marvin

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Test paths
testpaths = tests

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require services)
    slow: Slow tests (long-running operations)
    requires_api_key: Tests requiring OPENAI_API_KEY

# Minimum Python version
minversion = 3.11

# Coverage (if pytest-cov installed)
# addopts = --cov=. --cov-report=html --cov-report=term
