# =============================================================================
# nightwatch-config.yaml — Marvin Nightwatch Configuration
#
# Session monitoring and health check configuration
# =============================================================================

# Nightwatch scheduler settings
nightwatch:
  interval_seconds: 120          # Check interval (2 minutes)
  priority_terminals:            # Terminals that must always run
    - root
    - conductor

# Stuck session detection
stuck_detection:
  threshold_minutes: 10          # Inactive threshold for stuck detection
  nudge_retry_delay: 300         # Wait 5 min before re-nudging (seconds)
  max_nudge_count: 3             # Max nudges before escalation

# Paths (relative to SPACEOS_ROOT)
paths:
  spaceos_root: /opt/spaceos
  mailbox_base: docs/mailbox
  log_dir: logs/dispatcher

# Session auto-restart (future)
auto_restart:
  enabled: false                 # Auto-restart priority sessions
  max_restart_attempts: 3

# Telegram notifications
notifications:
  on_stuck: true                 # Notify on stuck session
  on_priority_down: true         # Notify if ROOT/CONDUCTOR down
  on_done_review: false          # Notify on review completion
