# --- Upstream backends ---
upstream joinery_backend {
    server 127.0.0.1:5002 max_fails=3 fail_timeout=30s;
}

# --- HTTP → HTTPS redirect (minden domain) ---
server {
    listen 80;
    server_name joinerytech.hu www.joinerytech.hu asztalostech.hu www.asztalostech.hu;
    return 301 https://$host$request_uri;
}

# --- joinerytech.hu (HTTPS) ---
server {
    listen 443 ssl;
    http2 on;
    server_name joinerytech.hu www.joinerytech.hu;

    # SSL cert (certbot tölti ki)
    ssl_certificate /etc/letsencrypt/live/joinerytech.hu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/joinerytech.hu/privkey.pem;

    # TLS hardening (SEC-02)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers (SEC-03, SEC-12)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Phase 3C: img-src data: blob: brand assets-hez
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.anthropic.com; frame-ancestors 'none';" always;

    # Brand header (T-07)
    proxy_set_header X-SpaceOS-Brand "joinerytech";

    # Phase 3C: Turborepo — new dist path
    root /opt/spaceos/design-portal/apps/joinerytech/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Static assets (Vite hashed files)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE streaming (Phase 2 deploy gate: proxy_buffering off)
    location /bff/chat {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-SpaceOS-Brand "joinerytech";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_cache off;
    }

    # Joinery API proxy (direct → :5002, SEC-04 timeout)
    location /bff/joinery/ {
        proxy_pass http://joinery_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # BFF proxy (general)
    location /bff/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-SpaceOS-Brand "joinerytech";
    }

    # Keycloak admin konzol — TILTVA externally (SEC-02)
    location /auth/admin/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8080/auth/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keycloak proxy (SEC-02)
    location /auth/ {
        proxy_pass http://127.0.0.1:8080/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

