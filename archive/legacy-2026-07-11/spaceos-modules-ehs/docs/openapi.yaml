    # ========================================
    # RISK ASSESSMENT AGGREGATE
    # ========================================
    RiskAssessmentDto:
      type: object
      required:
        - riskAssessmentId
        - tenantId
        - hazardDescription
        - severity
        - likelihood
        - riskScore
        - riskLevel
        - assessedBy
        - assessedAt
        - reviewDueDate
        - status
      properties:
        riskAssessmentId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        hazardDescription:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 5
          description: "1=Negligible, 5=Catastrophic"
        likelihood:
          type: integer
          minimum: 1
          maximum: 5
          description: "1=Rare, 5=Almost Certain"
        riskScore:
          type: integer
          minimum: 1
          maximum: 25
          description: "Calculated: Severity × Likelihood"
        riskLevel:
          $ref: '#/components/schemas/RiskLevel'
        assessedBy:
          type: string
          format: uuid
          description: EmployeeId (FK to HR module)
        assessedAt:
          type: string
          format: date-time
        reviewDueDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/RiskAssessmentStatus'
        controls:
          type: array
          items:
            $ref: '#/components/schemas/RiskControlDto'

    RiskLevel:
      type: string
      enum:
        - Low
        - Medium
        - High
      description: |
        Calculated based on RiskScore:
        Low: 1-5
        Medium: 6-12
        High: 15-25

    RiskAssessmentStatus:
      type: string
      enum:
        - Active
        - Archived

    RiskControlDto:
      type: object
      required:
        - description
        - implementationDate
      properties:
        description:
          type: string
        implementationDate:
          type: string
          format: date
        responsiblePerson:
          type: ['string', 'null']
          format: uuid
          description: EmployeeId (optional)

    CreateRiskAssessmentCommand:
      type: object
      required:
        - hazardDescription
        - severity
        - likelihood
        - reviewDueDate
      properties:
        hazardDescription:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 5
        likelihood:
          type: integer
          minimum: 1
          maximum: 5
        reviewDueDate:
          type: string
          format: date

    UpdateRiskAssessmentCommand:
      type: object
      properties:
        hazardDescription:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 5
        likelihood:
          type: integer
          minimum: 1
          maximum: 5
        reviewDueDate:
          type: string
          format: date

    AddRiskControlCommand:
      type: object
      required:
        - description
        - implementationDate
      properties:
        description:
          type: string
        implementationDate:
          type: string
          format: date
        responsiblePerson:
          type: string
          format: uuid
          description: EmployeeId (optional)

    RiskMatrixDto:
      type: object
      required:
        - matrix
      properties:
        matrix:
          type: array
          items:
            type: array
            items:
              type: integer
              description: "Count of risk assessments in this cell"
          description: "5×5 grid: matrix[severity-1][likelihood-1]"
        legend:
          type: object
          properties:
            low:
              type: array
              items:
                type: object
                properties:
                  severity:
                    type: integer
                  likelihood:
                    type: integer
            medium:
              type: array
              items:
                type: object
                properties:
                  severity:
                    type: integer
                  likelihood:
                    type: integer
            high:
              type: array
              items:
                type: object
                properties:
                  severity:
                    type: integer
                  likelihood:
                    type: integer

    PagedRiskAssessmentResponse:
      type: object
      required:
        - items
        - totalCount
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RiskAssessmentDto'
        totalCount:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    # ========================================
    # TRAINING RECORD AGGREGATE
    # ========================================
    TrainingRecordDto:
      type: object
      required:
        - trainingRecordId
        - tenantId
        - employeeId
        - trainingType
        - completedAt
        - status
      properties:
        trainingRecordId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        employeeId:
          type: string
          format: uuid
          description: EmployeeId (FK to HR module)
        trainingType:
          type: string
          description: "e.g., 'First Aid', 'Fire Safety', 'Machine Operation'"
        completedAt:
          type: string
          format: date-time
        expiresAt:
          type: ['string', 'null']
          format: date-time
        issuedBy:
          type: ['string', 'null']
          description: Certifying authority
        certificateNumber:
          type: ['string', 'null']
        status:
          $ref: '#/components/schemas/TrainingStatus'

    TrainingStatus:
      type: string
      enum:
        - Valid
        - Expiring
        - Expired
      description: |
        Calculated based on ExpiresAt:
        Valid: >30 days until expiration
        Expiring: ≤30 days until expiration
        Expired: Past expiration date

    CreateTrainingRecordCommand:
      type: object
      required:
        - employeeId
        - trainingType
        - completedAt
      properties:
        employeeId:
          type: string
          format: uuid
        trainingType:
          type: string
        completedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          description: Optional expiration date
        issuedBy:
          type: string
        certificateNumber:
          type: string

    RenewTrainingRecordCommand:
      type: object
      required:
        - completedAt
      properties:
        completedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    PagedTrainingRecordResponse:
      type: object
      required:
        - items
        - totalCount
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TrainingRecordDto'
        totalCount:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    # ========================================
    # COMMON ERROR RESPONSES
    # ========================================
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: ['object', 'null']

  responses:
    Unauthorized:
      description: Unauthorized (missing or invalid JWT token)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Forbidden (insufficient permissions or RLS violation)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    BadRequest:
      description: Bad request (validation error)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
