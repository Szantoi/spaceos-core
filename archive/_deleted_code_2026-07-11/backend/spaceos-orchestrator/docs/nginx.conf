# nginx reference config for SpaceOS on a single VPS
# Place in: /etc/nginx/sites-available/spaceos
# Enable:   ln -s /etc/nginx/sites-available/spaceos /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   nginx -s reload

server {
    listen 443 ssl http2;
    server_name yourdomain.com;   # ← replace

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ── React SPA ─────────────────────────────────────────────────────────────
    root /var/www/design-portal/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Stage dispatch — explicit header forwarding for module proxy ─────────
    location /bff/stages/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-SpaceOS-Brand   $http_x_spaceos_brand;
    }

    # ── BFF / Orchestrator (Node.js port 3000) ────────────────────────────────
    location /bff/ {
        proxy_pass http://127.0.0.1:3000/bff/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming (POST /bff/chat future streaming support)
        proxy_set_header Connection        '';
        proxy_buffering                    off;
        proxy_cache                        off;
        chunked_transfer_encoding          on;
        add_header X-Accel-Buffering       no;
    }

    # ── C# Kernel is NOT exposed externally ──────────────────────────────────
    # Port 5000 is firewall-blocked. Only the BFF can call it via localhost.
    # If you need to access Swagger in dev, use SSH tunnel:
    #   ssh -L 5000:127.0.0.1:5000 user@yourdomain.com
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}
