# nginx.conf — SpaceOS Orchestrator reverse proxy snippet
# Include in your server {} block or as a separate location block.
#
# Assumptions:
#   - Orchestrator runs on 127.0.0.1:3000 (pm2)
#   - Kernel (port 5000) is firewall-blocked externally
#   - SSL termination happens upstream (e.g., Certbot / nginx ssl block)

location /bff/ {
    proxy_pass         http://127.0.0.1:3000/bff/;
    proxy_http_version 1.1;

    # Required for SSE (Server-Sent Events)
    proxy_buffering            off;
    proxy_cache                off;
    chunked_transfer_encoding  on;

    # Keep-alive & timeout — 300 s covers long agentic loops
    proxy_read_timeout         300s;
    proxy_connect_timeout      10s;
    proxy_send_timeout         300s;

    # Forward real client IP and protocol
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # JWT is passed through as-is; do NOT strip Authorization header
    proxy_pass_header Authorization;
}

# Health check — no auth required
location /health {
    proxy_pass http://127.0.0.1:3000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
