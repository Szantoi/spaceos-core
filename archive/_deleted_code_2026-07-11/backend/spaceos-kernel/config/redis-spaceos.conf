# SpaceOS Redis configuration — Production hardening (BE-P2-08)
# Copy to /etc/redis/redis.conf on the VPS

bind 127.0.0.1
requirepass CHANGE_ME_IN_VAULT
port 6379

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence — disabled (ephemeral RL state)
save ""
appendonly no

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log

# Connection limits
timeout 300
tcp-keepalive 60
maxclients 128
