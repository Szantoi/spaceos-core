services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spaceos}
      POSTGRES_USER: ${POSTGRES_USER:-spaceos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/01-audit-roles.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spaceos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build: .
    environment:
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=${POSTGRES_DB:-spaceos};Username=${POSTGRES_USER:-spaceos};Password=${POSTGRES_PASSWORD}
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Issuer: spaceos-kernel
      Jwt__Audience: spaceos-kernel-api
      Jwt__RsaPublicKeyPem: ${JWT_RSA_PUBLIC_KEY_PEM:?JWT_RSA_PUBLIC_KEY_PEM is required}
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
