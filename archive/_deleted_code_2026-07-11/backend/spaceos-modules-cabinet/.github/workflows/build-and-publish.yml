name: Build and Publish

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test (net8.0)
        run: dotnet test --configuration Release --no-build --framework net8.0 --verbosity normal

      - name: Test (net10.0)
        run: dotnet test --configuration Release --no-build --framework net10.0 --verbosity normal

      - name: Pack (only on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet pack --configuration Release --no-build --output ./nupkgs

      - name: Publish to GitHub Packages (only on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet nuget add source --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push "./nupkgs/*.nupkg" \
            --source github \
            --api-key ${{ secrets.GITHUB_TOKEN }}
