      - id: TASK-DS-017
        name: Bug fixes from UAT feedback
        terminal: backend
        model: opus
        priority: critical
        status: pending
        blocked_by: ["TASK-DS-016"]
        triggers_on_done: ["TASK-DS-018"]
        estimated_nwt: 60
