version: "1.0"
project: "doorstar-softlaunch"
created: "2026-07-08"
updated: "2026-07-08"
description: "Doorstar Kft. Soft Launch — First Paying Customer (Q3 2026)"

config:
  default_model: sonnet
  auto_dispatch: false  # Manual dispatch (critical path, high business risk)
  notify_telegram: true
  retry_on_blocked: 3
  escalation_to: root

context:
  business_impact: "CRITICAL - First production customer, Q3 2026 revenue target"
  prerequisites_status:
    - "✅ EPIC-JOINERY-V2 DONE (Modules.Joinery deployed, 2026-05-15)"
    - "✅ B2B Handshake DONE (TenantHandshakeAllowlist implemented)"
    - "✅ VPS Infrastructure RUNNING (Kernel, Joinery, Orchestrator)"
    - "❌ Keycloak Doorstar realm PENDING (ProdReady Sprint status unknown)"
  documentation:
    - "docs/knowledge/architecture/SpaceOS_Doorstar_Onboarding_v4.md"
    - "EPICS.yaml: EPIC-DOORSTAR-SOFTLAUNCH (target: 2026-09-30)"

milestones:
  # ========================================
  # M1: KEYCLOAK DOORSTAR TENANT
  # ========================================
  - id: M1-KEYCLOAK
    name: Keycloak Doorstar Tenant Setup Complete
    status: pending
    blocked_by: []
    estimated_nwt: 120
    description: |
      Keycloak `spaceos` realm configuration + Doorstar tenant group creation + user seed.
      Deliverable: JWT token with `tenant_id`, `tenant_type`, `enabled_modules` claims working.

    tasks:
      - id: TASK-DS-001
        name: Verify Keycloak `spaceos` realm exists
        terminal: backend
        model: haiku
        priority: critical
        status: pending
        blocked_by: []
        triggers_on_done: ["TASK-DS-002"]
        estimated_nwt: 15
        description: |
          Check if `spaceos` Keycloak realm exists (ProdReady Sprint artifact).
          If NOT: escalate to Root (prerequisite missing).
          Output: realm config verification report.

      - id: TASK-DS-002
        name: Create Doorstar group + attributes
        terminal: backend
        model: sonnet
        priority: critical
        status: pending
        blocked_by: ["TASK-DS-001"]
        triggers_on_done: ["TASK-DS-003"]
        estimated_nwt: 30
        description: |
          Create Keycloak group: `doorstar`
          Attributes:
            - `tenant_id`: {DOORSTAR_TENANT_UUID}
            - `tenant_type`: "Manufacturer"
            - `enabled_modules`: '["door"]'
          Protocol mappers: Group Attribute → JWT Claim
          Output: group config + mapper config JSON

      - id: TASK-DS-003
        name: Seed Doorstar users (admin + 2 operators)
        terminal: backend
        model: sonnet
        priority: critical
        status: pending
        blocked_by: ["TASK-DS-002"]
        triggers_on_done: ["TASK-DS-004"]
        estimated_nwt: 30
        description: |
          Create 3 Keycloak users:
            - doorstar-admin (realm role: Admin)
            - doorstar-op1 (realm role: User)
            - doorstar-op2 (realm role: User)
          Assign to `doorstar` group.
          Output: user credentials (secure delivery to Root).

      - id: TASK-DS-004
        name: JWT token validation test
        terminal: backend
        model: sonnet
        priority: critical
        status: pending
        blocked_by: ["TASK-DS-003"]
        triggers_on_done: []
        estimated_nwt: 45
        description: |
          Integration test:
            1. Authenticate as doorstar-admin
            2. Decode JWT token
            3. Verify claims: tenant_id, tenant_type, enabled_modules, allowed_hosts
            4. Call Kernel /api/health with JWT → 200 OK
            5. Call Kernel /api/tenants/me → tenant metadata
          Output: Integration test report + JWT claim screenshot.

  # ========================================
  # M2: KERNEL + JOINERY DATABASE SEED
  # ========================================
  - id: M2-SEED
    name: Kernel + Joinery Database Seed Complete
    status: pending
    blocked_by: ["M1-KEYCLOAK"]
    estimated_nwt: 90
    description: |
      Seed Kernel (Tenants, Facilities) and Joinery (DoorstarSeedData.cs) databases.
      Deliverable: Doorstar tenant + facility + Joinery domain rules seeded, validated.

    tasks:
      - id: TASK-DS-005
        name: Kernel tenant seed (Tenants + Facilities)
        terminal: backend
        model: sonnet
        priority: critical
        status: pending
        blocked_by: []
        triggers_on_done: ["TASK-DS-006"]
        estimated_nwt: 30
        description: |
          Execute SQL seed script (docs/knowledge/.../Doorstar_v4.md section 7):
            - INSERT Doorstar tenant (TenantId from TASK-DS-002)
            - INSERT Facility (Doorstar Üzem)
          Validation:
            - SELECT * FROM "Tenants" WHERE "Name" = 'Doorstar Kft.'
            - RLS policy test: SET app.current_tenant_id = '{DOORSTAR_UUID}';
          Output: SQL execution log + validation results.

      - id: TASK-DS-006
        name: Joinery DoorstarSeedData.cs compilation
        terminal: backend
        model: sonnet
        priority: critical
        status: pending
        blocked_by: ["TASK-DS-005"]
        triggers_on_done: ["TASK-DS-007"]
        estimated_nwt: 30
        description: |
          Review DoorstarSeedData.cs status (Modules.Joinery).
          If MISSING: escalate to Root (prerequisite missing).
          If EXISTS: verify compilation + startup assertion logic.
          Output: Seed data validation report.

      - id: TASK-DS-007
        name: Joinery seed validation tests (BE-03)
        terminal: backend
        model: sonnet
        priority: high
        status: pending
        blocked_by: ["TASK-DS-006"]
        triggers_on_done: []
        estimated_nwt: 30
        description: |
          Execute xUnit tests (docs/knowledge/.../Doorstar_v4.md section 9.4):
            - AllPartDimensionRules_HaveValidComponentType
            - AllDoorTypeRules_CoverEveryDoorTypeEnum
            - GlobalConstants_ContainRequiredKeys
          Validation: All tests PASS.
          Output: Test execution report (xUnit XML + logs).

  # ========================================
  # M3: ORCHESTRATOR MEDIATION ROUTES
  # ========================================
  - id: M3-ORCHESTRATOR
    name: Orchestrator Joinery Mediation Routes Complete
    status: pending
    blocked_by: ["M2-SEED"]
    estimated_nwt: 180
    description: |
      Implement Orchestrator mediation pattern (ADR-010):
        - POST /bff/joinery/orders → Kernel FlowEpic + Joinery DoorOrder
        - Saga compensation logic (archive epic on Joinery failure)
        - Proxy routes for pass-through endpoints
      Deliverable: E2E test (Portal → Orchestrator → Kernel + Joinery).

    tasks:
      - id: TASK-DS-008
        name: Implement joineryOrders.ts route (mediated)
        terminal: backend
        model: opus
        priority: critical
        status: pending
        blocked_by: []
        triggers_on_done: ["TASK-DS-009"]
        estimated_nwt: 90
        description: |
          Implement Orchestrator route (docs/knowledge/.../Doorstar_v4.md section 6.3):
            - POST /bff/joinery/orders
            - ① Kernel: POST /api/epics (create FlowEpic)
            - ② Joinery: POST /api/joinery/orders (with flowEpicId)
            - Saga compensation: archiveEpicWithRetry (3× retry, exponential backoff)
          Security:
            - JWT forwarding (tenant_id claim)
            - Idempotency-Key header (Kernel)
            - 10s timeout (AbortController)
          Output: TypeScript implementation + integration test.

      - id: TASK-DS-009
        name: Implement joineryProxy.ts route (pass-through)
        terminal: backend
        model: sonnet
        priority: high
        status: pending
        blocked_by: ["TASK-DS-008"]
        triggers_on_done: ["TASK-DS-010"]
        estimated_nwt: 30
        description: |
          Implement proxy route (docs/knowledge/.../Doorstar_v4.md section 6.4):
            - http-proxy-middleware
            - Target: http://127.0.0.1:5002
            - Path rewrite: ^/bff/joinery → /api/joinery
            - 10s timeout
          Output: TypeScript implementation.

      - id: TASK-DS-010
        name: E2E integration test (Orchestrator → Kernel + Joinery)
        terminal: backend
        model: opus
        priority: critical
        status: pending
        blocked_by: ["TASK-DS-009"]
        triggers_on_done: ["TASK-DS-011"]
        estimated_nwt: 60
        description: |
          Playwright E2E test:
            1. Authenticate as doorstar-admin
            2. POST /bff/joinery/orders (valid DoorOrder payload)
            3. Verify:
               - 201 response (orderId + flowEpicId)
               - Kernel FlowEpic created (SELECT * FROM "FlowEpics")
               - Joinery DoorOrder created (SELECT * FROM "DoorOrders")
               - flowEpicId link correct
            4. Test saga compensation:
               - Inject Joinery 500 error
               - Verify FlowEpic archived (3× retry log)
          Output: Playwright test suite + execution report.

      - id: TASK-DS-011
        name: Nginx upstream config + health check
        terminal: backend
        model: sonnet
        priority: high
        status: pending
        blocked_by: ["TASK-DS-010"]
        triggers_on_done: []
        estimated_nwt: 0
        description: |
          Nginx config (docs/knowledge/.../Doorstar_v4.md section 8.2):
            - upstream joinery_backend { server 127.0.0.1:5002 max_fails=3 fail_timeout=30s; }
            - location /bff/joinery/ { proxy_pass http://joinery_backend; }
          Joinery health check:
            - GET /health endpoint implementation (if missing)
          Output: Nginx config snippet + health check curl test.
          NOTE: VPS Operator executes (not Backend terminal).

  # ========================================
  # M4: B2B HANDSHAKE VALIDATION
  # ========================================
  - id: M4-B2B
    name: B2B Handshake Validation Complete
    status: pending
    blocked_by: ["M3-ORCHESTRATOR"]
    estimated_nwt: 90
