        terminal: backend
        model: sonnet
        priority: medium
        status: pending
        blocked_by: ["TASK-DS-012"]
        triggers_on_done: ["TASK-DS-014"]
        estimated_nwt: 30
        description: |
          Integration test:
            1. Authenticate as doorstar-admin
            2. Decode JWT
            3. Verify `allowed_hosts` claim contains guest tenant host
            4. GET /api/handshakes/allowed-hosts → verify response
          Output: Integration test report.

      - id: TASK-DS-014
        name: B2B inter-tenant API call test
        terminal: backend
        model: opus
        priority: medium
        status: pending
        blocked_by: ["TASK-DS-013"]
        triggers_on_done: []
        estimated_nwt: 30
        description: |
          E2E B2B test:
            1. Doorstar tenant → Guest tenant API call (simulated quote request)
            2. Verify B2BHandshakeVerifier allows the call
            3. Verify RLS isolation (Doorstar cannot see Guest data)
          Output: Playwright E2E test + report.

  # ========================================
