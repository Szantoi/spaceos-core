      Deliverable: B2B integration test passing.

    tasks:
      - id: TASK-DS-012
        name: B2B allowlist seed (Doorstar ↔ Suppliers)
        terminal: backend
        model: sonnet
        priority: medium
        status: pending
        blocked_by: []
        triggers_on_done: ["TASK-DS-013"]
        estimated_nwt: 30
        description: |
          Seed TenantHandshakeAllowlist:
            - Doorstar ↔ Guest Tenant (for demo B2B flow)
            - Create guest tenant seed data
          SQL execution + validation.
          Output: Seed script + execution log.

      - id: TASK-DS-013
