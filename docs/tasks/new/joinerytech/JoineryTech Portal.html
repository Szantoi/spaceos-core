  <style>
    html, body, #root { height: 100%; }
    /* Native form controls must render in light appearance so the closed
       select (dark text on white) is consistent. We pin color-scheme but do
       NOT force option text color: on macOS the native dropdown popup may
       stay dark regardless, and the OS draws its own readable option text —
       overriding it would make the text invisible on a dark popup. */
    :root { color-scheme: light; }
    select, input, textarea, button { color-scheme: light; }
    /* On Windows, Chrome renders text with subpixel (ClearType) antialiasing.
       When a control lands on a fractional pixel position (common inside CSS
       grid `1fr`/fixed-px tracks and flex layouts), the subpixel boundaries
       misalign and the text shows heavy red/cyan/green colour fringing — the
       "rainbow text" reported in selects. -webkit-font-smoothing is a no-op on
       Windows, so we instead promote each control to its own compositing layer
       (translateZ(0)): composited text falls back to grayscale AA, which is
       immune to fractional positioning and renders crisply. */
    select, input, textarea, button, option, optgroup {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    select, input, textarea {
      transform: translateZ(0);
    }
    /* The open native dropdown list inherits the OS popup color when the
       option background is transparent — in dark mode that makes the dark
       option text invisible. Force an explicit light popup (Chromium/Firefox
       honour option styling; Safari relies on the color-scheme:light above). */
    select option,
    select optgroup {
      background-color: #ffffff;
      color: #1c1917;
    }
    select option:checked,
    select option:hover {
      background-color: #f5f5f4;
      color: #1c1917;
    }
    body { font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
           color: #1c1917; background: #f7f7f5;
           font-feature-settings: "ss01","cv11";
           -webkit-font-smoothing: antialiased;
           -moz-osx-font-smoothing: grayscale; }
    .font-mono, code, pre { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    button { font-family: inherit; }
  </style>
