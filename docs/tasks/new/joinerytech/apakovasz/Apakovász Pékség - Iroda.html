<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Apakovász Pékség — Iroda</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,500;0,600;0,700;1,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#F4EBDC; --surface:#FBF6EC; --ink:#2A211A; --ink-soft:#6B5D4F;
  --line:#E6D8C3; --crust:#8A4B2B; --crust-deep:#5E3019; --amber:#C97B3C;
  --sage:#6E7A52; --ember:#B5462F;
  --serif:'Bitter',Georgia,serif; --sans:'Hanken Grotesk',system-ui,sans-serif;
  --radius:14px; --shadow:0 1px 2px rgba(60,40,20,.05),0 8px 24px rgba(90,55,25,.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{ font-family:var(--sans); color:var(--ink); line-height:1.45; background:var(--bg); -webkit-font-smoothing:antialiased; }
#root{height:100%;}
h1,h2,h3,h4{margin:0;}

/* ════════════ DESKTOP SHELL ════════════ */
.pc{ display:grid; grid-template-columns:268px 1fr; height:100vh; overflow:hidden; }

/* oldalsáv */
.side{ background:linear-gradient(180deg,#FBF6EC,#F6EEDF); border-right:1px solid var(--line); display:flex; flex-direction:column; overflow:hidden; }
.side-brand{ display:flex; align-items:center; gap:11px; padding:18px 18px 14px; border-bottom:1px solid var(--line); }
.logo{ width:40px; height:40px; border-radius:11px; display:grid; place-items:center; background:linear-gradient(150deg,var(--crust),var(--crust-deep)); color:#F7E9D6; font-family:var(--serif); font-weight:700; font-size:22px; box-shadow:inset 0 1px 0 rgba(255,255,255,.18); flex:none; }
.brand-name{ font-family:var(--serif); font-weight:700; font-size:18px; letter-spacing:-.01em; }
.brand-sub{ font-size:11px; color:var(--ink-soft); margin-top:-1px; }
.side-nav{ flex:1; overflow-y:auto; padding:10px 10px 16px; }
.nav-group{ margin-bottom:14px; }
.nav-group-name{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--amber); padding:6px 10px 4px; }
.nav-item{ width:100%; display:flex; align-items:center; gap:10px; padding:8px 10px; border:none; background:none; border-radius:9px; cursor:pointer; color:var(--ink-soft); font-family:var(--sans); font-size:13.5px; font-weight:500; text-align:left; margin-bottom:1px; }
.nav-item:hover{ background:#F1E7D6; color:var(--ink); }
.nav-item.active{ background:var(--crust); color:#F7E9D6; font-weight:600; }
.nav-ico{ width:18px; text-align:center; font-size:14px; flex:none; filter:grayscale(.2); }
.nav-item.active .nav-ico{ filter:none; }
.nav-lab{ flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.nav-op{ font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; background:#EBD9C6; color:var(--crust); padding:1px 5px; border-radius:5px; }
.nav-item.active .nav-op{ background:rgba(255,255,255,.22); color:#F7E9D6; }
.side-foot{ padding:12px 14px 16px; border-top:1px solid var(--line); }
.core-badge{ background:#E2E7D2; border-radius:10px; padding:10px 12px; display:flex; flex-direction:column; gap:3px; }
.core-badge strong{ font-size:12px; color:var(--sage); }
.core-badge span{ font-size:11px; color:var(--ink-soft); line-height:1.4; }

/* fő oszlop */
.main-col{ display:flex; flex-direction:column; overflow:hidden; }
.pc-top{ display:flex; align-items:center; gap:18px; padding:0 24px; height:60px; border-bottom:1px solid var(--line); background:rgba(251,246,236,.7); backdrop-filter:blur(8px); flex:none; }
.pc-top-title{ font-family:var(--serif); font-weight:700; font-size:18px; white-space:nowrap; }
.pc-top-kpis{ display:flex; gap:18px; margin-left:auto; }
.tk{ font-size:12px; color:var(--ink-soft); }
.tk b{ font-family:var(--serif); font-size:14px; color:var(--ink); }
.tk.warn b{ color:var(--ember); }
.pc-top-user{ }
.pc-content{ flex:1; overflow-y:auto; padding:24px; }
.pc-content.op{ padding:0; background:linear-gradient(180deg,#EFE5D4,#E7DAC4); }

/* ════════════ DESKTOP WORLD ════════════ */
.world{ max-width:1180px; }
.wh{ display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:18px; }
.wh-k{ font-size:11px; font-weight:700; color:var(--amber); text-transform:uppercase; letter-spacing:.08em; }
.wh-title{ font-family:var(--serif); font-weight:700; font-size:27px; letter-spacing:-.02em; margin:3px 0 5px; white-space:nowrap; }
.wh-sub{ font-size:13px; color:var(--ink-soft); }

/* KPI csempék */
.stat-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:13px; margin-bottom:13px; }
.stat{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:15px 16px; box-shadow:var(--shadow); }
.stat-label{ font-size:11.5px; color:var(--ink-soft); font-weight:600; }
.stat-value{ font-family:var(--serif); font-weight:700; font-size:25px; line-height:1.1; margin-top:5px; letter-spacing:-.01em; }
.stat-sub{ font-size:11.5px; color:var(--ink-soft); margin-top:3px; }

/* panel */
.panel{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:16px; overflow:hidden; }
.panel-head{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--line); }
.panel-head h3{ font-family:var(--serif); font-weight:600; font-size:16px; }
.panel-body{ padding:14px 16px; }
.panel-body.nopad{ padding:0; }
.cols-2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }

/* tábla */
.dt{ width:100%; border-collapse:collapse; font-size:13px; }
.dt th{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); padding:11px 14px; border-bottom:1px solid var(--line); white-space:nowrap; }
.dt td{ padding:11px 14px; border-bottom:1px solid #EFE5D4; vertical-align:middle; }
.dt tr:last-child td{ border-bottom:none; }
.dt tbody tr:hover{ background:#FAF4E8; }
.dt .num{ text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
.dt .mono{ font-variant-numeric:tabular-nums; }
.dt .muted{ color:var(--ink-soft); }
.dt .overdue{ color:var(--ember); font-weight:600; }
.td-prod{ display:inline-flex; align-items:center; gap:8px; white-space:nowrap; }
.margin-cell{ display:flex; align-items:center; gap:8px; }
.margin-pct{ font-size:12px; font-weight:600; width:34px; text-align:right; }

/* avatar */
.avatar{ border-radius:50%; background:linear-gradient(150deg,#C99A6E,#8A4B2B); color:#FBF1E2; display:inline-grid; place-items:center; font-weight:700; font-family:var(--sans); flex:none; }

/* prog */
.prog{ flex:1; height:7px; background:#EAE0CF; border-radius:99px; overflow:hidden; min-width:60px; }
.prog-fill{ height:100%; border-radius:99px; }

/* stepflow */
.stepflow{ display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.step{ font-size:11px; color:var(--ink-soft); padding:2px 7px; border-radius:6px; background:#F1E7D6; }
.step.done{ background:#E2E7D2; color:var(--sage); }
.step.cur{ background:var(--crust); color:#F7E9D6; font-weight:600; }
.step-sep{ color:var(--line); font-size:11px; }

/* szegmens */
.seg{ display:inline-flex; background:#EEE4D3; border-radius:10px; padding:3px; margin-bottom:14px; }
.seg-btn{ border:none; background:none; padding:7px 16px; border-radius:8px; font-family:var(--sans); font-weight:600; font-size:13px; color:var(--ink-soft); cursor:pointer; }
.seg-btn.on{ background:var(--surface); color:var(--crust); box-shadow:var(--shadow); }

/* exec */
.exec-banner{ display:flex; align-items:center; gap:10px; background:#F5D9CF; color:#9A3A23; padding:12px 16px; border-radius:12px; font-size:13.5px; margin-bottom:16px; }
.exec-banner.ok{ background:#E2E7D2; color:#4E5A36; }
.exec-banner-dot{ width:9px; height:9px; border-radius:50%; background:currentColor; flex:none; }
.alert-list{ display:flex; flex-direction:column; }
.alert-line{ display:flex; align-items:center; gap:11px; padding:10px 4px; border:none; background:none; border-bottom:1px solid #EFE5D4; cursor:pointer; text-align:left; width:100%; font-family:var(--sans); }
.alert-line:last-child{ border-bottom:none; }
.alert-bar{ width:4px; height:26px; border-radius:3px; flex:none; }
.alert-t{ flex:1; font-size:13px; }
.alert-s{ font-size:11.5px; color:var(--ink-soft); font-weight:600; }
.quick-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px; }
.quick{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:14px 8px; border:1px solid var(--line); background:var(--surface); border-radius:11px; cursor:pointer; font-family:var(--sans); font-size:12px; font-weight:600; color:var(--ink); }
.quick:hover{ border-color:var(--crust); }
.quick-ico{ font-size:20px; }

/* kanban */
.kanban{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.kan-col{ background:#F0E6D5; border-radius:12px; padding:10px; }
.kan-head{ display:flex; align-items:center; justify-content:space-between; padding:2px 4px 10px; }
.kan-count{ font-size:12px; font-weight:700; color:var(--ink-soft); }
.kan-card{ background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:11px; margin-bottom:8px; box-shadow:var(--shadow); }
.kan-card strong{ font-size:13.5px; }
.kan-note{ font-size:11.5px; color:var(--ink-soft); margin:5px 0 8px; line-height:1.4; }
.kan-foot{ display:flex; align-items:center; justify-content:space-between; }
.kan-val{ font-family:var(--serif); font-weight:700; font-size:13px; color:var(--crust); white-space:nowrap; }
.kan-empty{ text-align:center; color:var(--ink-soft); padding:14px; font-size:13px; }

/* pill + gomb (megosztott) */
.pill{ display:inline-flex; align-items:center; gap:6px; border-radius:999px; font-weight:600; white-space:nowrap; }
.pill-dot{ width:6px; height:6px; border-radius:50%; flex:none; }
.muted-sm{ font-size:12px; color:var(--ink-soft); }
.muted{ color:var(--ink-soft); }
.btn{ font-family:var(--sans); font-weight:600; font-size:13.5px; border-radius:10px; padding:9px 14px; cursor:pointer; border:1px solid transparent; transition:transform .08s; white-space:nowrap; }
.btn:active{ transform:scale(.97); }
.btn:disabled{ opacity:.45; cursor:not-allowed; }
.btn.primary{ background:var(--crust); color:#F7E9D6; }
.btn.ghost{ background:var(--surface); color:var(--crust); border-color:var(--line); }
.btn.danger{ background:var(--ember); color:#FBEDE7; }
.btn.full{ width:100%; }
.btn.small{ font-size:12px; padding:6px 11px; border-radius:8px; }
.foot-note{ font-size:11.5px; color:var(--ink-soft); font-style:italic; margin:14px 2px 24px; line-height:1.5; max-width:760px; }

/* ════════════ ÜZEMI (mobil) BEÁGYAZÁS ════════════ */
.opwrap{ display:flex; gap:0; min-height:100%; }
.opframe{ width:452px; flex:none; background:var(--bg); border-right:1px solid rgba(120,80,40,.16); box-shadow:0 0 60px rgba(70,45,20,.12); display:flex; flex-direction:column; min-height:100%; }
.opframe-bar{ display:flex; align-items:center; gap:6px; padding:10px 16px; background:#2A211A; }
.opframe-dot{ width:9px; height:9px; border-radius:50%; background:#5E4B3A; }
.opframe-dot:nth-child(1){ background:#B5462F; } .opframe-dot:nth-child(2){ background:#C97B3C; } .opframe-dot:nth-child(3){ background:#6E7A52; }
.opframe-label{ margin-left:8px; font-size:11px; color:#C9B79F; font-weight:600; white-space:nowrap; }
.opframe-screen{ flex:1; overflow-y:auto; }
.opnote{ flex:1; padding:40px 36px; max-width:460px; align-self:center; }
.opnote h4{ font-family:var(--serif); font-weight:700; font-size:19px; margin-bottom:10px; }
.opnote p{ font-size:14px; color:var(--ink); line-height:1.6; margin:0 0 12px; }

/* ── megosztott mobil komponens-stílusok (az üzemi nézetekhez) ── */
.screen{ padding:18px 16px 8px; }
.hello{ margin-bottom:16px; }
.hello-k{ font-size:12px; font-weight:700; color:var(--crust); text-transform:uppercase; letter-spacing:.08em; }
.hello h1{ font-family:var(--serif); font-weight:700; font-size:29px; line-height:1.05; margin:3px 0 4px; letter-spacing:-.02em; }
.hello-sub{ font-size:13px; color:var(--ink-soft); }
.banner{ display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:13px; font-size:13.5px; font-weight:500; margin-bottom:16px; }
.banner-dot{ width:9px; height:9px; border-radius:50%; flex:none; }
.card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin-bottom:11px; }
.sec-title{ display:flex; align-items:flex-end; justify-content:space-between; margin:20px 2px 11px; }
.kicker{ font-size:11px; font-weight:700; color:var(--amber); text-transform:uppercase; letter-spacing:.07em; }
.sec-title h2{ font-family:var(--serif); font-weight:600; font-size:18px; margin:2px 0 0; letter-spacing:-.01em; }
.bar{ height:7px; background:#EAE0CF; border-radius:99px; overflow:hidden; margin:9px 0; }
.bar-lg{ height:10px; }
.bar-fill{ height:100%; border-radius:99px; transition:width .3s ease; }
.alert-card{ border-color:#EAC9BB; background:#FBEFE8; }
.alert-row{ display:flex; align-items:center; gap:11px; }
.prod-card{ padding:13px 14px; }
.prod-top{ display:flex; align-items:center; gap:11px; }
.prod-name{ flex:1; } .prod-name strong{ font-size:15px; }
.prod-counts{ text-align:right; }
.big-num{ font-family:var(--serif); font-weight:700; font-size:24px; line-height:1; }
.prod-meta{ display:flex; flex-wrap:wrap; gap:6px; margin-top:2px; }
.chips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.chip{ display:inline-flex; align-items:center; gap:5px; background:#F1E7D6; color:var(--ink); border-radius:8px; padding:4px 9px; font-size:12px; font-weight:500; }
.chip-sm{ background:#F1E7D6; color:var(--ink); border-radius:7px; padding:3px 8px; font-size:11.5px; font-weight:500; }
.deliv-head{ display:flex; align-items:center; justify-content:space-between; } .deliv-head strong{ font-size:15px; }
.ord-card{ padding:13px 14px; }
.ord-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:4px; } .ord-head strong{ font-size:14.5px; }
.ord-card .btn{ margin-top:10px; }
.cafe-card{ padding:6px 14px; }
.cafe-row{ display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line); } .cafe-row:last-child{ border-bottom:none; }
.tag-soon{ font-size:10.5px; font-weight:600; color:var(--amber); background:#F7E6CC; padding:2px 7px; border-radius:6px; margin-left:8px; }
.mep-card{ padding:8px 14px 12px; }
.mep-row{ display:grid; grid-template-columns:auto 1fr auto auto; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); } .mep-row:last-of-type{ border-bottom:none; }
.mep-check{ color:var(--amber); font-size:16px; } .mep-name{ font-weight:500; font-size:13.5px; } .mep-zone{ font-size:11px; color:var(--ink-soft); }
.mep-qty{ font-family:var(--serif); font-weight:600; font-size:14px; white-space:nowrap; }
.mep-foot{ font-size:11.5px; color:var(--ink-soft); margin-top:10px; padding-top:9px; border-top:1px dashed var(--line); }
.batch-card{ padding:12px 14px; }
.batch-top{ display:flex; align-items:center; gap:10px; }
.batch-time{ font-family:var(--serif); font-weight:700; font-size:14px; color:var(--crust); width:42px; }
.batch-name{ flex:1; } .batch-name strong{ font-size:14.5px; }
.fail-reason{ font-size:12px; color:var(--ember); background:#FBEDE7; border-radius:8px; padding:7px 10px; margin-top:9px; }
.batch-actions{ display:flex; gap:7px; margin-top:11px; flex-wrap:wrap; }
.kpi-row{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px; margin-bottom:6px; }
.kpi{ padding:13px 10px; text-align:center; margin-bottom:0; }
.kpi-num{ font-family:var(--serif); font-weight:700; font-size:26px; line-height:1; color:var(--crust); }
.kpi-lab{ font-size:10.5px; color:var(--ink-soft); margin-top:5px; line-height:1.25; }
.station-card{ padding:13px 14px; }
.station-head{ display:flex; align-items:flex-start; justify-content:space-between; } .station-head strong{ font-size:15px; }
.station-util{ font-family:var(--serif); font-weight:700; font-size:18px; }
.station-meta{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:2px; } .station-meta span{ font-size:12px; }
.timeline{ margin-top:11px; border-top:1px solid var(--line); padding-top:9px; display:flex; flex-direction:column; gap:7px; }
.tl-item{ display:flex; align-items:center; gap:8px; }
.tl-time{ font-family:var(--serif); font-weight:600; font-size:12.5px; color:var(--crust); width:40px; }
.tl-name{ flex:1; font-size:13px; } .tl-min{ font-size:11.5px; color:var(--ink-soft); }
.trend-card{ padding:8px 14px 12px; }
.trend-row{ display:grid; grid-template-columns:auto 1fr auto auto; align-items:center; gap:11px; padding:8px 0; border-bottom:1px solid var(--line); } .trend-row:last-of-type{ border-bottom:none; }
.trend-name{ font-size:13px; font-weight:500; }
.spark{ display:flex; align-items:flex-end; gap:3px; height:26px; width:78px; }
.spark-bar{ flex:1; border-radius:2px 2px 0 0; min-height:3px; }
.trend-fc{ font-family:var(--serif); font-weight:700; font-size:15px; color:var(--crust); width:48px; text-align:right; white-space:nowrap; }
.mrp-card{ padding:13px 14px; }
.mrp-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; } .mrp-name strong{ font-size:14.5px; }
.mrp-bar{ margin:4px 0 2px; }
.mrp-foot{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:8px; }
.ok-card{ text-align:center; color:var(--sage); font-weight:600; padding:18px; }
.ok-list{ padding:4px 14px; }
.ok-row{ display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px; } .ok-row:last-child{ border-bottom:none; }
.mov-card{ padding:4px 14px; }
.mov-row{ display:grid; grid-template-columns:1fr auto auto; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px; } .mov-row:last-child{ border-bottom:none; }
.mov-qty{ font-family:var(--serif); font-weight:700; color:var(--sage); }
.shop-grid{ display:grid; grid-template-columns:1fr 1fr; gap:0; padding:0; overflow:hidden; }
.shop-item{ padding:14px 12px; text-align:center; border-right:1px solid var(--line); border-bottom:1px solid var(--line); }
.shop-item:nth-child(2n){ border-right:none; }
.shop-emoji{ margin-bottom:5px; }
.shop-name{ font-size:13px; font-weight:600; line-height:1.2; }
.shop-price{ font-family:var(--serif); font-weight:600; color:var(--crust); font-size:13.5px; margin:3px 0 7px; }
.shop-stock{ margin-bottom:9px; }
.shop-btns .btn{ width:100%; }
.toast{ position:fixed; bottom:32px; left:50%; transform:translateX(-50%); background:var(--ink); color:#F7E9D6; padding:10px 18px; border-radius:999px; font-size:13px; font-weight:500; z-index:60; box-shadow:0 8px 24px rgba(0,0,0,.25); }
.sheet-backdrop{ position:fixed; inset:0; background:rgba(42,33,26,.45); z-index:80; display:flex; align-items:center; justify-content:center; animation:fade .2s; }
.sheet{ width:420px; max-width:92vw; background:var(--surface); border-radius:18px; padding:8px 20px 22px; max-height:88vh; overflow-y:auto; animation:pop .22s cubic-bezier(.2,.8,.2,1); }
.sheet-grip{ display:none; }
.sheet-head{ display:flex; align-items:center; justify-content:space-between; margin:8px 0; }
.sheet-head h3{ font-family:var(--serif); font-weight:700; font-size:19px; }
.sheet-x{ border:none; background:#F1E7D6; width:30px; height:30px; border-radius:50%; cursor:pointer; color:var(--ink-soft); font-size:14px; }
.sheet-body{ font-size:14px; }
.ta{ width:100%; border:1px solid var(--line); border-radius:11px; padding:11px; font-family:var(--sans); font-size:14px; resize:none; margin-bottom:12px; background:#fff; }
.ta:focus{ outline:2px solid var(--amber); border-color:transparent; }
@keyframes fade{ from{ opacity:0; } } @keyframes pop{ from{ transform:scale(.94); opacity:0; } }
