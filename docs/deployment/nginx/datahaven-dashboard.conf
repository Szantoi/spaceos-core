# ============================================================================
# datahaven.joinerytech.hu — SpaceOS Datahaven Dashboard (React + API)
# 2026-06-20 — Phase 6+6.5 React Dashboard
# ============================================================================

upstream datahaven_dashboard_backend {
    server 127.0.0.1:3456 max_fails=3 fail_timeout=30s;
}

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    server_name datahaven.joinerytech.hu;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://datahaven.joinerytech.hu$request_uri;
    }
}

# --- datahaven.joinerytech.hu (HTTPS) ---
server {
    listen 443 ssl;
    http2 on;
    server_name datahaven.joinerytech.hu;

    # SSL cert (certbot managed)
    ssl_certificate /etc/letsencrypt/live/joinerytech.hu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/joinerytech.hu/privkey.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # SSE endpoint - no buffering
    location /api/events {
        proxy_pass http://datahaven_dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://datahaven_dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health check
    location /health {
        proxy_pass http://datahaven_dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # React static assets (cache for 1 hour)
    location /assets/ {
        proxy_pass http://datahaven_dashboard_backend;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # React frontend (all other routes)
    location / {
        proxy_pass http://datahaven_dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
